# Warframe KB publisher.
# Refreshes public Warframe data, builds a versioned KB zip, and uploads it
# as a GitHub Release for Lume to download on app activation.
name: Publish Warframe KB

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'kb/**'
      - 'version.txt'
      - 'build-kb.mjs'
      - 'refresh-kb.ps1'
      - '.github/workflows/build-kb.yml'
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh KB from public data sources
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        shell: powershell
        run: .\refresh-kb.ps1

      - name: Bump version when refreshed data changed
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        id: refresh
        shell: powershell
        run: |
          $changes = git status --porcelain -- kb
          if (-not $changes) {
            "changed=false" >> $env:GITHUB_OUTPUT
            Write-Host "No KB content changes after refresh."
            exit 0
          }

          $current = [int](Get-Content version.txt -Raw)
          $next = $current + 1
          Set-Content -LiteralPath version.txt -Value $next -Encoding ascii
          "changed=true" >> $env:GITHUB_OUTPUT
          "kbVersion=$next" >> $env:GITHUB_OUTPUT
          Write-Host "KB changed; bumped version from $current to $next."

      - name: Commit refreshed KB
        if: steps.refresh.outputs.changed == 'true'
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kb version.txt
          git commit -m "kb: refresh public Warframe data"
          git push

      - name: Read version
        id: ver
        shell: powershell
        run: |
          $version = (Get-Content version.txt -Raw).Trim()
          "kbVersion=$version" >> $env:GITHUB_OUTPUT

      - name: Check if release v${{ steps.ver.outputs.kbVersion }} already exists
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          gh release view "v${{ steps.ver.outputs.kbVersion }}" --json tagName *> $null
          if ($LASTEXITCODE -eq 0) {
            "exists=true" >> $env:GITHUB_OUTPUT
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Build KB
        if: steps.release_check.outputs.exists == 'false'
        run: node build-kb.mjs

      - name: Create GitHub release v${{ steps.ver.outputs.kbVersion }}
        if: steps.release_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          gh release create "v${{ steps.ver.outputs.kbVersion }}" `
            "dist/warframe-kb-v${{ steps.ver.outputs.kbVersion }}.zip" `
            "dist/manifest.json" `
            --title "Warframe KB v${{ steps.ver.outputs.kbVersion }}" `
            --notes "Published by build-kb.yml on $(Get-Date -AsUTC -Format 'yyyy-MM-ddTHH:mm:ssZ')"

      - name: Skip release already exists
        if: steps.release_check.outputs.exists == 'true'
        shell: powershell
        run: |
          echo "Release v${{ steps.ver.outputs.kbVersion }} already exists; nothing to do."
          echo "Bump version.txt to publish a new release."
